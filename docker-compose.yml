services:
  ollama:
    image: ollama/ollama
    container_name: contextlayer_ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant
    container_name: contextlayer_qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: contextlayer_app
    ports:
      - "8501:8501"
    depends_on:
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./docs:/app/docs
    environment:
      - QDRANT_HOST=qdrant
      - OLLAMA_HOST=ollama

volumes:
  ollama_data:
  qdrant_data:
